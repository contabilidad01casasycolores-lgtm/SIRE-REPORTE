name: Actualizar Reporte SIRE vs SAP

on:
  schedule:
    - cron: '5 13 * * *'   # Lunes–Viernes 9am hora Perú (UTC-5 = 14:00 UTC)
  workflow_dispatch:           # Botón manual desde la pestaña Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: pip install openpyxl requests

      - name: Descargar SIRE.txt desde Google Drive
        env:
          GDRIVE_SIRE_ID: ${{ secrets.GDRIVE_SIRE_ID }}
        run: |
          python3 - << 'EOF'
          import requests, os, sys
          fid = os.environ['GDRIVE_SIRE_ID']
          print(f"📥 Descargando SIRE.txt...")
          s = requests.Session()
          url = f"https://drive.google.com/uc?export=download&id={fid}&confirm=t"
          r = s.get(url, stream=True)
          for k,v in r.cookies.items():
              if 'download_warning' in k:
                  r = s.get(url+f"&confirm={v}", stream=True); break
          if r.status_code != 200:
              print(f"❌ Error {r.status_code}"); sys.exit(1)
          with open('SIRE.txt','wb') as f:
              for chunk in r.iter_content(32768): f.write(chunk)
          size = os.path.getsize('SIRE.txt')
          print(f"✅ SIRE.txt: {size:,} bytes")
          if size < 100: print("❌ Archivo muy pequeño"); sys.exit(1)
          EOF

      - name: Descargar SAP.xlsx desde Google Drive
        env:
          GDRIVE_SAP_ID: ${{ secrets.GDRIVE_SAP_ID }}
        run: |
          python3 - << 'EOF'
          import requests, os, sys
          fid = os.environ['GDRIVE_SAP_ID']
          print(f"📥 Descargando SAP.xlsx...")
          s = requests.Session()
          url = f"https://drive.google.com/uc?export=download&id={fid}&confirm=t"
          r = s.get(url, stream=True)
          for k,v in r.cookies.items():
              if 'download_warning' in k:
                  r = s.get(url+f"&confirm={v}", stream=True); break
          if r.status_code != 200:
              print(f"❌ Error {r.status_code}"); sys.exit(1)
          with open('SAP.xlsx','wb') as f:
              for chunk in r.iter_content(32768): f.write(chunk)
          size = os.path.getsize('SAP.xlsx')
          print(f"✅ SAP.xlsx: {size:,} bytes")
          if size < 1000: print("❌ Archivo muy pequeño"); sys.exit(1)
          EOF

      - name: Generar index.html
        run: python3 generar_reporte.py SIRE.txt SAP.xlsx

      - name: Publicar en GitHub Pages
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet && echo "⚠️ Sin cambios" || \
            git commit -m "Reporte actualizado $(date +'%d/%m/%Y %H:%M') hora Perú"
          git push
